<div class="admin-main">
  <a href="index.php?class=CaracteristicaList" class="btn-back">← Voltar para Características</a>
  <div class="admin-card">
    <h2>Cadastro de Característica</h2>
    <form method="post" action="/index.php?class=CaracteristicaForm&method=cadastro" class="admin-form">
      <div style="display:none;">
        <input type="text" name="id" id="id" value="{id}" readonly />
      </div>
      <div class="form-row">
        <label>Título</label>
        <input type="text" name="titulo" id="titulo" value="{titulo}" placeholder="Ex: Gestão de Ativos" />
      </div>
      <div class="form-row">
        <label>Descrição</label>
        <input type="text" name="descricao" id="descricao" value="{descricao}" placeholder="Descrição da característica" />
      </div>
      <div style="margin-top:22px; display:flex; gap:10px;">
        <button type="submit" class="btn btn-primary">Salvar Característica</button>
        <a href="index.php?class=CaracteristicaList" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
