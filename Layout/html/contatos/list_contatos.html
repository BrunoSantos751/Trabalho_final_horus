<html>

<head>
    <meta charset="utf-8">
    <title> Listagem de pessoas </title>
    <link href="css/list.css" rel="stylesheet" type="text/css" media="screen" />
</head>

<body>
    <header>
        {{header}}
    </header>
    <table border=1>
        <thead>
            <tr>
                <th> Remover </th>
                <th> Id </th>
                <th> Nome </th>
                <th> Email</th>
                <th> Telefone</th>
                <th> Mensagem</th>
                <th> Criado em</th>
            </tr>
        </thead>
        <tbody>
            {items}
        </tbody>
    </table>
</body>

</html>
