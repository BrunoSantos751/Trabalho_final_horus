<form method="post" action="/index.php?class=TestemunhoForm&method=cadastro" id="formlogin" name="formlogin" enctype="multipart/form-data">
  <fieldset id="fie">
    <legend>Cadastro de Testemunho</legend>
    <br />
    <label>Id: </label>
    <input type="text" name="id" id="id" value="{id}" readonly/><br />
    <label>Nome: </label>
    <input type="text" name="nome" id="nome" value="{nome}" /><br />
    <label>Função: </label>
    <input type="text" name="funcao" id="funcao" value="{funcao}" /><br />
    <label>Titulo: </label>
    <input type="text" name="titulo" id="titulo" value="{titulo}" /><br />
    <label>Descrição: </label>
    <input type="text" name="descricao" id="descricao" value="{descricao}" /><br />
    <label> Foto:</label>
    <input type="file" name="foto" id="foto" value="{foto}" accept="image/png, image/jpeg, image/jpg" /><br />
    <label>Imagem de fundo: </label>
    <input type="file" name="imagem_fundo" id="imagem_fundo" value="{imagem_fundo}" accept="image/png, image/jpeg, image/jpg" /><br />

    <input type="submit" value="CADASTRAR" />
  </fieldset>
</form>
