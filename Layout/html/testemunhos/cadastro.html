<div style="margin-bottom: 20px;">
  <a href="index.php?class=TestemunhoList"><img src="images/admin/voltar.png" style="width: 40px;" alt="Voltar"></a>
</div>
<form method="post" action="/index.php?class=TestemunhoForm&method=cadastro" id="formlogin" name="formlogin"
  enctype="multipart/form-data">
  <fieldset id="fie">
    <legend>Cadastro de Testemunho</legend>
    <br />
    <label>Id: </label>
    <input type="text" name="id" id="id" value="{id}" readonly /><br />
    <label>Nome: </label>
    <input type="text" name="nome" id="nome" value="{nome}" /><br />
    <label>Função: </label>
    <input type="text" name="funcao" id="funcao" value="{funcao}" /><br />
    <label>Titulo: </label>
    <input type="text" name="titulo" id="titulo" value="{titulo}" /><br />
    <label>Descrição: </label>
    <input type="text" name="descricao" id="descricao" value="{descricao}" /><br />
    <label> Foto:</label>
    <input type="file" name="foto" id="foto" accept="image/png, image/jpeg, image/jpg" />
    <input type="hidden" name="foto_salva" value="{foto}" />
    <span style="font-size: 11px; color: #555;">{foto}</span><br />
    
    <label>Imagem de fundo: </label>
    <input type="file" name="imagem_fundo" id="imagem_fundo" accept="image/png, image/jpeg, image/jpg" />
    <input type="hidden" name="imagem_fundo_salva" value="{imagem_fundo}" />
    <span style="font-size: 11px; color: #555;">{imagem_fundo}</span><br />

    <input type="submit" value="CADASTRAR" />
  </fieldset>
</form>
