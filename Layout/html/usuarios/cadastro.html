<div class="admin-main">
  <div class="admin-card">
    <h2>{titulo}</h2>
    <form method="post" action="/index.php?class=UsuarioForm&method=cadastro" class="admin-form">
      <div style="display:none;">
        <label>{code_label}</label>
        <input name="id" readonly type="text" value="{id}" aria-readonly="true" {hidden_id}>
      </div>
      <div class="form-row">
        <label>Email</label>
        <input type="email" name="email" id="email" value="{email}" placeholder="usuario@email.com" />
      </div>
      <div class="form-row">
        <label>{SENHA}</label>
        <input type="password" name="password" id="password" value="{senha}" placeholder="••••••••" />
      </div>
      <div style="margin-top:22px; display:flex; gap:10px;">
        <button type="submit" class="btn btn-primary">{acao}</button>
        <a href="index.php?class=UsuarioList" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
