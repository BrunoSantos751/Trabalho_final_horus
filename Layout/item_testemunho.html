<div class="item">
    <div class="testi-box position-relative overflow-hidden">
        <div class="row align-items-center">
            <div class="col-md-5">
                <img src="{imagem_fundo}" alt="" class="img-fluid">
            </div>
            <div class="col-md-7">
                <div class="p-4">
                    <div class="d-flex align-items-center">
                        <div class="flex-shrink-0">
                            <div class="avatar">
                                <img src="{imagem_usuario}" alt=""
                                    class="img-fluid rounded-circle">
                            </div>
                        </div>
                        <div class="flex-grow-1 ms-3">
                            <p class="f-14 mb-0 text-dark fw-bold"><span
                                    class="text-muted fw-normal"></span> {nome} 
                            </p>
                            <div class="date">
                                <p class="text-muted mb-0 f-14">{funcao}</p>
                            </div>
                        </div>
                    </div>

                    <div class="mt-3">
                        <h5 class="fw-bold">{titulo_testemunho}</h5>
                        <p class="text-muted f-14">{descricao_testemunho}
                        </p>
                    </div>
                </div>
            </div>
        </div>
        <div class="back-image position-absolute end-0 bottom-0">

        </div>

    </div>
</div>
